<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Management - Order History</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
    }

    /* ── Login form ── */
    #login-section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    #login-section label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #374151;
    }

    #login-section .input-row {
      display: flex;
      gap: 0.75rem;
    }

    #customer-id-input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.875rem;
    }

    #load-btn {
      padding: 0.625rem 1.25rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    #load-btn:hover { background: #1d4ed8; }

    /* ── Order list ── */
    #orders-section { display: none; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-header h2 { font-size: 1.1rem; color: #374151; }

    #order-list { display: flex; flex-direction: column; gap: 1rem; }

    .order-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .order-info { flex: 1; }

    .order-product {
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .order-meta {
      font-size: 0.8rem;
      color: #6b7280;
    }

    .order-status {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 0.4rem;
    }

    .status-Pending    { background: #fef9c3; color: #854d0e; }
    .status-Confirmed  { background: #dcfce7; color: #166534; }
    .status-Cancelled  { background: #fee2e2; color: #991b1b; }
    .status-Shipped    { background: #dbeafe; color: #1e40af; }
    .status-Delivered  { background: #d1fae5; color: #065f46; }

    .cancel-btn {
      padding: 0.5rem 1rem;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .cancel-btn:hover:not(:disabled) { background: #dc2626; }
    .cancel-btn:disabled { background: #fca5a5; cursor: not-allowed; }

    /* ── States ── */
    #empty-state {
      text-align: center;
      padding: 3rem;
      color: #9ca3af;
      display: none;
    }

    #error-state {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 1rem;
      display: none;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.25rem;
      color: #2563eb;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Về trang sản phẩm</a>
    <h1>📋 Lịch sử đơn hàng</h1>

    <!-- Login Section -->
    <div id="login-section">
      <label for="customer-id-input">Customer ID</label>
      <div class="input-row">
        <input
          id="customer-id-input"
          type="text"
          placeholder="Nhập Customer ID của bạn..."
          value=""
        />
        <button id="load-btn">Xem đơn hàng</button>
      </div>
    </div>

    <!-- Error -->
    <div id="error-state" role="alert"></div>

    <!-- Orders Section -->
    <div id="orders-section">
      <div class="section-header">
        <h2 id="orders-heading">Đơn hàng của bạn</h2>
      </div>
      <div id="empty-state">Chưa có đơn hàng nào.</div>
      <div id="order-list" role="list"></div>
    </div>
  </div>

  <script src="/history.js"></script>
</body>
</html>
