<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Management - Product Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
    }

    .product-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    .product-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .product-desc {
      color: #666;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .product-price {
      font-size: 1.75rem;
      font-weight: 800;
      color: #2563eb;
      margin-bottom: 1.5rem;
    }

    #order-now-btn {
      width: 100%;
      padding: 0.875rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #order-now-btn:hover:not(:disabled) {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    #order-now-btn:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    #confirmation-message {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-weight: 500;
      display: none;
    }

    #confirmation-message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    #confirmation-message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .order-id {
      font-family: monospace;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="product-image">💻</div>
    <h1 class="product-name">Laptop ThinkPad X1 Carbon</h1>
    <p class="product-desc">
      Laptop cao cấp dành cho chuyên gia. Intel Core i7, RAM 16GB, SSD 512GB.
      Bảo hành 24 tháng.
    </p>
    <p class="product-price">20,000,000 VND</p>

    <button id="order-now-btn">Order Now</button>

    <div id="confirmation-message" role="status" aria-live="polite"></div>

      <p style="margin-top:1.25rem; text-align:center;">
        <a href="/history.html" id="history-link" style="color:#2563eb; font-size:0.9rem;">
          📋 Xem lịch sử đơn hàng →
        </a>
      </p>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
